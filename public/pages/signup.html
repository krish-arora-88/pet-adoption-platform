<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="../scripts/scripts.js"></script>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/7Uh55Ey.png">
</head>

<body>
    <a href="/">
        <img src="https://i.imgur.com/7Uh55Ey.png" alt="Site Logo" class="site-logo" size="100px">
    </a>
    <!-- ======================================================================
// =========== Client(ClientID:  INTEGER(10), FirstName: VARCHAR NOT NULL, 
// LastName: VARCHAR, Address: VARCHAR NOT NULL, ContactNumber: INTEGER)
// ====================================================================== -->
    <div class="responsibility">
        <h1>Sign Up</h1>
        <form id="sign_up">
            <input id="ClientFirstName" placeholder="First Name" maxlength="100"></input>
            <input id="ClientLastName" placeholder="Last Name" maxlength="100"></input>
            <input id="ClientAddress" placeholder="Address" maxlength="100"></input>
            <input id="ClientContact" placeholder="Phone Number" maxlength="20"></input>
            <select id="ClientType">
                <option value='Donor'>Donor</option>
                <option value='Owner'>Adopter</option>
            </select>

            <div class="container">
                <div class="button-container">
                    <div class="dog">
                        <div class="tail"></div>
                        <div class="body"></div>
                        <div class="head">
                            <div class="eyes">
                                <div class="left"></div>
                                <div class="right"></div>
                            </div>
                            <div class="nuzzle">
                                <div class="mouth">
                                    <div class="tongue"></div>
                                </div>
                                <div class="nose">
                                    <div class="nostrils"></div>
                                    <div class="highlight"></div>
                                </div>
                            </div>
                        </div>
                        <div class="ears">
                            <div class="left"></div>
                            <div class="right"></div>
                        </div>
                    </div>
                    <button type="submit">
                        Create Account
                    </button>
                    <div class="paw"></div>
                    <div class="paw top"></div>
                </div>
            </div>

        </form>
        <br>

        <p id="sign_up_status"></p>
    </div>

    <div class="responsibility">
        <h1>Update Information</h1>
        <form id="client_update">
            <input id="ClientNumber" placeholder="Account ID" maxlength="10">
            <input id="ClientFirstName_update" placeholder="First Name" maxlength="100">
            <input id="ClientLastName_update" placeholder="Last Name" maxlength="100">
            <input id="ClientAddress_update" placeholder="Address" maxlength="100">
            <input id="ClientContact_update" placeholder="Phone Number" maxlength="20">
            <button type="submit">Update Account</button>
        </form>
        <br>
        <p id="update_status"></p>
    </div>
    <br>
    <table id="client_table" class="tables-style" border="1">
        <thead>
            <tr>

                <!-- Table head, need to be adjusted accordingly to align with your own. -->
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Address</th>
                <th>Phone Number</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <br>
    <button id="resetClient">Reset Client</button>
    <p id="resetResultMsg"></p>
    <p><a href="../index.html">Return Home</a></p>
</body>

</html>
