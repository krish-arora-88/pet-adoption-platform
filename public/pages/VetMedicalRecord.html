<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../scripts/scripts.js"></script>
    <link rel="stylesheet" href="../styles/styles.css">
    <title>Vet Medical Records</title>
</head>

<body>

    <form id="medicalRecordForm">
        <input type="text" id="petMicrochipID" placeholder="Pet Microchip ID" required />
        <input type="text" id="recordID" placeholder="Record ID" required />
        <input type="text" id="insurancePolicyNumber" placeholder="Insurance Policy Number" required />
        <input type="text" id="vaccinationStatus" placeholder="Vaccination Status" required />
        <input type="text" id="healthCondition" placeholder="Health Condition" />
        <input type="text" id="vetNotes" placeholder="Vet Notes" />
        <button type="submit">Add Medical Record</button>
    </form>

    <table id="medicalRecordTable" border="1">
        <thead>
            <tr>
                <th>Pet Microchip ID</th>
                <th>Record ID</th>
                <th>Insurance Policy #</th>
                <th>Vaccination Status</th>
                <th>Health Condition</th>
                <th>Vet Notes</th>
            </tr>
        </thead>
        <tbody id="medicalRecordTableBody">

        </tbody>
    </table>

    <button id="resetMedicalRecordTable">Reset Medical Record Table</button>

    <p><a href="../index.html">Return Home</a></p>

    <script src ="../scripts/scripts.js"></script>
</body>

</html>
