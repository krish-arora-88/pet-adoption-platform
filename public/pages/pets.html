<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pets</title>
    <script src="../scripts/scripts.js"></script>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/7Uh55Ey.png">
</head>

<body>
    <a href="/">
        <img src="https://i.imgur.com/7Uh55Ey.png" alt="Site Logo" class="site-logo" size="100px">
    </a>
    <h1>Available Pets</h1>
    <div class="filter-container">
        <div class="filter-item">
            <label for="speciesFilter">Filter by Species:</label>
            <select id="speciesFilter">
                <option value="all">All Species</option>
                <option value="Dog">Dog</option>
                <option value="Cat">Cat</option>
                <option value="Bird">Bird</option>
                <!-- Add more species as needed -->
            </select>
        </div>

        <div class="filter-item">
            <label for="ageMinFilter">Age Range:</label>
            <input type="number" id="ageMinFilter" min="0" placeholder="Min Age" class="age-input">
            <span>to</span>
            <input type="number" id="ageMaxFilter" min="0" placeholder="Max Age" class="age-input">
        </div>

        <button id="applyFilters">Apply Filters</button>
        <button id="resetFilters">Reset Filters</button>
    </div>

    <table id="pet_table" border="1">
        <thead>
            <tr>
                <!--Table head, need to be adjusted accordingly to align with your own.-->
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Breed</th>
                <th>Gender</th>
                <th>Species</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <button id="see_pets">See Pets</button>
    <button id="resetPetTable">Reset Table</button>
    <br>
    </div>

    <div class="responsibility">
        <h2>View Oldest Pets</h2>
        <button id="viewPetStats">View Average Available Pet Ages</button>
        <br>
        <table id="petStatsTable" border="1">
            <thead>
                <tr>
                    <th>Species</th>
                    <th>Average Age</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <p><a href="../index.html">Return Home</a></p>
</body>

</html>
