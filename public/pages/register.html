<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Adoption Platform - Register</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/7Uh55Ey.png">
    <script type="module" src="../scripts/auth.js"></script>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-card">
            <div class="sidebar-logo">
                <img src="https://i.imgur.com/7Uh55Ey.png" alt="PetAdopt BC Logo">
                <span>PetAdopt BC</span>
            </div>
            <h1>Create Account</h1>
            <form id="registerForm">
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="registerConfirmPassword">Confirm Password</label>
                    <input type="password" id="registerConfirmPassword" placeholder="Re-enter password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
                <div id="registerMessage" class="message"></div>
            </form>
            <p style="text-align:center; margin-top:16px;">
                Already have an account? <a href="login.html">Login here</a>
            </p>
        </div>
    </div>
</body>
</html>
