<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pet Adoption Platform</title>
    <script src="../scripts/scripts.js"></script>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/7Uh55Ey.png">
</head>

<body>
    <a href="/">
        <img src="https://i.imgur.com/7Uh55Ey.png" alt="Site Logo" class="site-logo" size="100px">
    </a>
    <h1>Adoption Centres</h1>
    <table id="adoption_center_table" class="tables-style">
        <thead>
            <tr>
                <th>CenterLicenseNumber</th>
                <th>CenterName</th>
                <th>Address</th>
                <th>AnimalCapacity</th>
            </tr>
        </thead>
        <tbody id="adoption_centres">
            <!-- Adoption centres will be populated here -->
        </tbody>
    </table>
    <hr />

    <h2>Add a New Adoption Center</h2>
    <form id="new_adoption_center">
        <label for="centerLicenseNumber">Center License Number<a style="color: #d15047">*</a>:</label>
        <input type="number" id="centerLicenseNumber" required /><br /><br />

        <label for="centerName">Center Name<a style="color: #d15047">*</a>:</label>
        <input type="text" id="centerName" required /><br /><br />

        <label for="address">Address<a style="color: #d15047">*</a>:</label>
        <input type="text" id="address" required /><br /><br />

        <label for="animalCapacity">Animal Capacity<a style="color: #d15047">*</a>:</label>
        <input type="number" id="animalCapacity" required /><br /><br />

        <button type="submit">Add Adoption Center</button>
    </form>
    <div id="new_adoption_center_message"></div>

    <hr />

    <!-- FORM: Update an Adoption Center -->
    <h2>Update an Existing Adoption Center</h2>
    <form id="adoption_center_update">
        <label for="centerLicenseNumber_update">Center License Number (to update)<a
                style="color: #d15047">*</a>:</label>
        <input type="number" id="centerLicenseNumber_update" required /><br /><br />

        <label for="centerName_update">New Center Name<a style="color: #d15047">*</a>:</label>
        <input type="text" id="centerName_update" /><br /><br />

        <label for="address_update">New Address<a style="color: #d15047">*</a>:</label>
        <input type="text" id="address_update" /><br /><br />

        <label for="animalCapacity_update">New Animal Capacity<a style="color: #d15047">*</a>:</label>
        <input type="number" id="animalCapacity_update" /><br /><br />

        <button type="submit">Update Adoption Center</button>
    </form>
    <div id="adoption_update_status"></div>

    <hr />

    <p><a href="../index.html">Return Home</a></p>
</body>

</html>
