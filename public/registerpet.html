<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Adoption Platform</title>
    <script src="scripts.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/7Uh55Ey.png">
</head>

<body>
    <img src="https://i.imgur.com/7Uh55Ey.png" alt="Site Logo" class="site-logo" size="100px" />
    <h1>Protect BC Pets!</h1>


    <form id="new_pet">
        <input id="MicrochipID" placeholder="MicrochipID"></input>
        <input id="petName" placeholder="Name"></input>
        <input id="petAge" placeholder="Age"></input>
        <input id="breed" placeholder="Breed"></input>
        <input id="gender" placeholder="Gender"></input>

        <button type="submit">Register Pet</button>
    </form>

    <button type = "click" id = "resetPetTable"> reset table</button>

    <div id="new_pet_message"></div>
    <p><a href="/">Return Home</a></p>
</body>

</html>
