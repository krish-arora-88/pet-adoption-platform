<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Adoption Platform</title>
    <link rel = "scripts" href = "scripts.js"/>
    
</head>
<body>
    <h1>Database Connection Status: 
        <!-- An in-line placeholder to display connection status. -->
        <span id="dbStatus"> </span>
        <!-- A loading GIF, will be hided once get the status. -->
        <img id="loadingGif" class="loading-gif" src="loading_100px.gif" alt="Loading...">
    </h1>

    <h1>Welcome to the Pet Adoption Platform</h1>
    <p><a href="/pets">Available Pets</a></p>
    <p><a href="/pets/create">Register your Pet</a></p>
    <p><a href="/adoptioncentres">View Adoption Centres</a></p>
    <p><a href="/users/create">Sign up</a></p>
    <p><a href="/adoptions">Manage your Adoptions</a></p>
    <p><a href="/adoptions/create">Adopt a Pet</a></p>
</br>
    <h1>Protect BC Pets!</h1>
    

    <form id = "new_pet">
        <input id = "MicrochipID" placeholder = "MicrochipID"></input>
        <input id = "petName" placeholder = "Name"></input>
        <input id = "petAge" placeholder = "Age"></input>
        <input id = "breed" placeholder="Breed"></input>
        <input id = "gender" placeholder = "Gender"></input>

        <button type = "submit">Register Dog</button>
    </form>

    <div id = "new_pet_message"></div>

    <h2>Show Pets</h2>
    <table id="pet_table" border="1">
        <thead>
            <tr>
                <!--Table head, need to be adjusted accordingly to align with your own.-->
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Breed</th>
                <th>Gender</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</body>
</html>
