<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Adoption Platform</title>
    <link rel="scripts" href="scripts.js" />
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/7Uh55Ey.png">
</head>

<body>
    <div class="page-header">
        <img src="https://i.imgur.com/7Uh55Ey.png" alt="Site Logo" class="site-logo" size="100px" />

        <h1 class="db-connection">Database Connection Status:
            <!-- An in-line placeholder to display connection status. -->
            <span id="dbStatus"> </span>
            <!-- A loading GIF, will be hided once get the status. -->
            <img id="loadingGif" class="loading" class="loading-gif" src="https://i.imgur.com/dA93pzk.gif"
                alt="Loading...">
        </h1>
    </div>
    <h1>Welcome to the Pet Adoption Platform</h1>
    <p><a href="pets.html">Available Pets</a></p>
    <p><a href="registerpet.html">Register your Pet</a></p>
    <p><a href="adoptioncentres.html">View Adoption Centres</a></p>
    <p><a href="/users/create">Sign up</a></p>
    <p><a href="adoptions.html">Manage your Adoptions</a></p>
    <p><a href="/adoptions/create">Adopt a Pet</a></p>
    </br>

    <h2>Show Pets</h2>
    <table id="pet_table" border="1">
        <thead>
            <tr>
                <!--Table head, need to be adjusted accordingly to align with your own.-->
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Breed</th>
                <th>Gender</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</body>

</html>
