<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Adoption Platform</title>
    <script src="scripts.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/7Uh55Ey.png">
</head>

<body>
    <img src="https://i.imgur.com/7Uh55Ey.png" alt="Site Logo" class="site-logo" size="100px" />
    <h1>Manage Your Adoptions</h1>
    <table id="adoption_table" border="1">
        <thead>
            <tr>
                <th>Adoption ID</th>
                <th>Pet Name</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <!-- Example adoption records -->
            <tr>
                <td>101</td>
                <td>Buddy</td>
                <td>Pending</td>
                <td><button>Cancel Adoption</button></td>
            </tr>
            <tr>
                <td>102</td>
                <td>Luna</td>
                <td>Approved</td>
                <td><button>View Details</button></td>
            </tr>
        </tbody>
    </table>
    <p><a href="/">Return Home</a></p>
</body>

</html>
